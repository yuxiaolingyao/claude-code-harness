name: Conformance Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Run conformance tests
        run: bash tests/conformance.sh

      - name: Verify fail-closed behavior
        run: |
          set +e
          echo '{}' | bash hooks/firewall.sh 2>/dev/null; r1=$?
          echo '{}' | bash hooks/file-guard.sh 2>/dev/null; r2=$?
          echo '{}' | bash hooks/content-guard.sh 2>/dev/null; r3=$?
          set -e
          [ $r1 -eq 2 ] || { echo "FAIL: firewall not fail-closed (got $r1)"; exit 1; }
          [ $r2 -eq 2 ] || { echo "FAIL: file-guard not fail-closed (got $r2)"; exit 1; }
          [ $r3 -eq 2 ] || { echo "FAIL: content-guard not fail-closed (got $r3)"; exit 1; }
          echo "fail-closed: all 3 hooks OK"
